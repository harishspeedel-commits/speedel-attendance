<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SPEEDEL EXPRESS - Ultimate Enterprise System</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        body.dark-mode { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        body.dark-mode .card { background: rgba(30,30,50,0.95); color: #fff; }
        body.dark-mode .navbar { background: rgba(30,30,50,0.95); }
        body.dark-mode input, body.dark-mode select { background: #2a2a3e; color: #fff; border-color: #4a4a6e; }
        
        .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; position: sticky; top: 0; z-index: 1000; }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-img { width: 40px; height: 40px; object-fit: contain; border-radius: 8px; }
        .logo-text .main { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-text .sub { font-size: 9px; color: #666; }
        .nav-links { display: flex; gap: 0.3rem; flex-wrap: wrap; max-height: 70px; overflow-y: auto; }
        .nav-btn { background: none; border: none; padding: 5px 10px; font-size: 11px; font-weight: 500; cursor: pointer; border-radius: 8px; transition: all 0.3s; color: #555; display: flex; align-items: center; gap: 4px; }
        .nav-btn:hover { background: #f0f0f0; }
        .nav-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .logout-btn { background: #dc3545; color: white; }
        .main-container { max-width: 1400px; margin: 0 auto; padding: 15px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: rgba(255,255,255,0.98); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .card-header { font-size: 16px; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #e0e0e0; display: flex; align-items: center; gap: 8px; justify-content: space-between; flex-wrap: wrap; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 12px; }
        input, select { width: 100%; padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 13px; }
        .btn { padding: 8px 16px; border: none; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-sm { padding: 4px 8px; font-size: 11px; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 15px; padding: 12px; color: white; text-align: center; cursor: pointer; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-number { font-size: 24px; font-weight: 800; }
        .stat-label { font-size: 10px; opacity: 0.9; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 8px; text-align: left; color: white; font-size: 11px; }
        td { padding: 6px 8px; border-bottom: 1px solid #e0e0e0; font-size: 11px; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 12px; font-size: 10px; font-weight: 600; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .alert { padding: 8px 12px; border-radius: 8px; margin-bottom: 12px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .webcam-box { background: #000; border-radius: 10px; overflow: hidden; text-align: center; }
        video, #photoPreview { width: 100%; max-width: 280px; border-radius: 10px; margin: 0 auto; }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 8px; }
            .nav-links { justify-content: center; max-height: 150px; }
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWXXso720Qo8Q5A-nHge6DtoamYzLn97Q",
            authDomain: "speedel-attendance.firebaseapp.com",
            projectId: "speedel-attendance",
            storageBucket: "speedel-attendance.firebasestorage.app",
            messagingSenderId: "693149953722",
            appId: "1:693149953722:web:1bc91ae862fd46778bdc83"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null, currentUserRole = null, currentUserCompany = null, currentUserData = null;
        let currentPhoto = null, stream = null, currentLocation = null, currentLogoUrl = null;
        let darkMode = localStorage.getItem('darkMode') === 'true';
        
        // Updated Admin Credentials
        const ADMIN_EMAIL = "Harishspeedel@gmail.com";
        const ADMIN_PASSWORD = "Lucifer@007";

        function showAlert(msg, type) {
            const container = document.getElementById('alertContainer');
            if (!container) return;
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }

        async function loadLogo() {
            try {
                const doc = await db.collection('settings').doc('companyLogo').get();
                currentLogoUrl = doc.exists && doc.data().logoUrl ? doc.data().logoUrl : "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23667eea'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white' font-weight='bold'%3ES%3C/text%3E%3C/svg%3E";
                document.querySelectorAll('.logo-img').forEach(img => img.src = currentLogoUrl);
            } catch(e) {}
        }

        // Create/Ensure Admin user in Firestore
        async function ensureAdminInFirestore(user) {
            if (user.email !== ADMIN_EMAIL) return false;
            
            // Check if admin exists in Firestore
            const snapshot = await db.collection('users').where('uid', '==', user.uid).get();
            
            if (snapshot.empty) {
                // Create admin in Firestore
                await db.collection('users').add({
                    uid: user.uid,
                    name: "Super Admin",
                    email: ADMIN_EMAIL,
                    role: "admin",
                    companyId: "",
                    createdAt: new Date()
                });
                console.log("Admin created in Firestore");
                return true;
            }
            return true;
        }

        function toggleDarkMode() {
            darkMode = !darkMode;
            localStorage.setItem('darkMode', darkMode);
            if (darkMode) document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
        }

        function navigateTo(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(`page-${page}`);
            if (target) target.classList.add('active');
        }

        // ============ LOGIN ============
        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="main-container" style="display:flex;justify-content:center;align-items:center;min-height:100vh;">
                    <div class="card" style="max-width:380px;">
                        <div style="text-align:center;margin-bottom:20px;">
                            <div class="logo-container" style="justify-content:center;">
                                <img id="loginLogo" class="logo-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23667eea'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white' font-weight='bold'%3ES%3C/text%3E%3C/svg%3E">
                                <div class="logo-text"><span class="main">SPEEDEL</span><span class="sub">EXPRESS</span></div>
                            </div>
                            <h3>Welcome Back</h3>
                            <p style="font-size:12px;color:#666;margin-top:5px;">Login to your account</p>
                        </div>
                        <form id="loginForm">
                            <input type="email" id="email" placeholder="Email" style="width:100%;margin-bottom:10px;padding:10px;">
                            <input type="password" id="password" placeholder="Password" style="width:100%;margin-bottom:15px;padding:10px;">
                            <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
                        </form>
                        <div id="alertContainer" style="margin-top:15px;"></div>
                    </div>
                </div>
            `;
            loadLogo();
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                try {
                    const result = await auth.signInWithEmailAndPassword(email, password);
                    showAlert('Login successful! Redirecting...', 'success');
                } catch(error) { 
                    if(error.code === 'auth/user-not-found'){
                        showAlert('User not found. Please check email.', 'error');
                    } else if(error.code === 'auth/wrong-password'){
                        showAlert('Wrong password!', 'error');
                    } else {
                        showAlert('Login failed: ' + error.message, 'error');
                    }
                }
            });
        }

        // ============ MAIN LAYOUT ============
        function renderMainLayout() {
            const isAdmin = currentUserRole === 'admin';
            document.getElementById('app').innerHTML = `
                <div class="navbar">
                    <div class="logo-container" onclick="navigateTo('dashboard')">
                        <img id="navLogo" class="logo-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23667eea'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white' font-weight='bold'%3ES%3C/text%3E%3C/svg%3E">
                        <div class="logo-text"><span class="main">SPEEDEL</span><span class="sub">EXPRESS</span></div>
                    </div>
                    <div class="nav-links">
                        <button class="nav-btn" onclick="navigateTo('dashboard')"><i class="fas fa-home"></i> Home</button>
                        ${isAdmin ? `<button class="nav-btn" onclick="navigateTo('companies')"><i class="fas fa-building"></i> Companies</button>` : ''}
                        ${isAdmin ? `<button class="nav-btn" onclick="navigateTo('users')"><i class="fas fa-users"></i> Users</button>` : ''}
                        ${isAdmin ? `<button class="nav-btn" onclick="navigateTo('leaves')"><i class="fas fa-calendar"></i> Leaves</button>` : ''}
                        ${isAdmin ? `<button class="nav-btn" onclick="navigateTo('tasks')"><i class="fas fa-tasks"></i> Tasks</button>` : ''}
                        ${isAdmin ? `<button class="nav-btn" onclick="navigateTo('vehicles')"><i class="fas fa-truck"></i> Vehicles</button>` : ''}
                        ${isAdmin ? `<button class="nav-btn" onclick="navigateTo('customers')"><i class="fas fa-user-friends"></i> Customers</button>` : ''}
                        ${isAdmin ? `<button class="nav-btn" onclick="navigateTo('expenses')"><i class="fas fa-receipt"></i> Expenses</button>` : ''}
                        ${isAdmin ? `<button class="nav-btn" onclick="navigateTo('notices')"><i class="fas fa-bullhorn"></i> Notices</button>` : ''}
                        ${isAdmin ? `<button class="nav-btn" onclick="navigateTo('holidays')"><i class="fas fa-calendar-week"></i> Holidays</button>` : ''}
                        ${isAdmin ? `<button class="nav-btn" onclick="navigateTo('payroll')"><i class="fas fa-money-bill"></i> Payroll</button>` : ''}
                        ${isAdmin ? `<button class="nav-btn" onclick="navigateTo('settings')"><i class="fas fa-cog"></i> Settings</button>` : ''}
                        <button class="nav-btn" onclick="navigateTo('attendance')"><i class="fas fa-camera"></i> Attendance</button>
                        <button class="nav-btn" onclick="navigateTo('my-leaves')"><i class="fas fa-calendar-minus"></i> My Leaves</button>
                        <button class="nav-btn" onclick="navigateTo('my-tasks')"><i class="fas fa-clipboard-list"></i> My Tasks</button>
                        <button class="nav-btn" onclick="navigateTo('noticeboard')"><i class="fas fa-bullhorn"></i> Notices</button>
                        <button class="nav-btn" onclick="navigateTo('reports')"><i class="fas fa-chart-bar"></i> Reports</button>
                        <button class="nav-btn" onclick="toggleDarkMode()"><i class="fas ${darkMode ? 'fa-sun' : 'fa-moon'}"></i></button>
                        <button class="nav-btn logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </div>
                </div>
                <div class="main-container">
                    <div id="alertContainer"></div>
                    <div id="page-dashboard" class="page active"></div>
                    <div id="page-companies" class="page"></div><div id="page-users" class="page"></div>
                    <div id="page-leaves" class="page"></div><div id="page-tasks" class="page"></div>
                    <div id="page-vehicles" class="page"></div><div id="page-customers" class="page"></div>
                    <div id="page-expenses" class="page"></div><div id="page-notices" class="page"></div>
                    <div id="page-holidays" class="page"></div><div id="page-payroll" class="page"></div>
                    <div id="page-settings" class="page"></div><div id="page-attendance" class="page"></div>
                    <div id="page-my-leaves" class="page"></div><div id="page-my-tasks" class="page"></div>
                    <div id="page-noticeboard" class="page"></div><div id="page-reports" class="page"></div>
                </div>
            `;
            loadLogo();
            loadDashboard();
            if(isAdmin) { 
                loadCompanies(); loadUsers(); loadLeavesAdmin(); loadTasksAdmin(); 
                loadVehicles(); loadCustomers(); loadExpenses(); loadNoticesAdmin(); 
                loadHolidays(); loadPayroll(); loadSettings(); 
            }
            loadAttendancePage(); loadMyLeaves(); loadMyTasks(); loadNoticeboard(); loadReports();
        }

        // ============ DASHBOARD ============
        async function loadDashboard() {
            let totalEmp=0, present=0, pendingLeaves=0, pendingTasks=0;
            try {
                let users=await db.collection('users').get(); totalEmp=users.size;
                let today=new Date().toISOString().split('T')[0];
                let att=await db.collection('attendance').where('date','==',today).get(); present=att.size;
                let leaves=await db.collection('leaves').where('status','==','pending').get(); pendingLeaves=leaves.size;
                let tasks=await db.collection('tasks').where('status','==','pending').get(); pendingTasks=tasks.size;
            } catch(e){}
            document.getElementById('page-dashboard').innerHTML = `
                <div class="grid-4">
                    <div class="stat-card" onclick="navigateTo('users')"><div class="stat-number">${totalEmp}</div><div class="stat-label">Employees</div></div>
                    <div class="stat-card" onclick="navigateTo('attendance')"><div class="stat-number">${present}</div><div class="stat-label">Present Today</div></div>
                    <div class="stat-card" onclick="navigateTo('leaves')"><div class="stat-number">${pendingLeaves}</div><div class="stat-label">Pending Leaves</div></div>
                    <div class="stat-card" onclick="navigateTo('tasks')"><div class="stat-number">${pendingTasks}</div><div class="stat-label">Pending Tasks</div></div>
                </div>
                <div class="card"><div class="card-header"><i class="fas fa-chart-line"></i> Quick Actions</div>
                <div class="grid-3">
                    <button class="btn btn-primary" onclick="navigateTo('attendance')"><i class="fas fa-camera"></i> Mark Attendance</button>
                    <button class="btn btn-success" onclick="navigateTo('my-leaves')"><i class="fas fa-calendar"></i> Apply Leave</button>
                    <button class="btn btn-info" onclick="navigateTo('reports')"><i class="fas fa-chart-bar"></i> View Reports</button>
                </div></div>
            `;
        }

        // ============ COMPANIES ============
        async function loadCompanies() {
            let snap=await db.collection('companies').get();
            let html=`<div class="card"><div class="card-header">🏢 Companies <button class="btn btn-primary btn-sm" onclick="addCompany()">+ Add</button></div><div class="table-container"><table><thead><tr><th>Name</th><th>Branches</th><th>Actions</th></tr></thead><tbody>`;
            snap.forEach(d=>{ let data=d.data(); html+=`<tr><td>${data.name}</td><td>${data.branches?.length||0}</td><td><button class="btn btn-warning btn-sm" onclick="editCompany('${d.id}','${data.name}')">Edit</button> <button class="btn btn-danger btn-sm" onclick="deleteCompany('${d.id}')">Del</button></td></tr>`; });
            html+=`</tbody></table></div></div>`;
            document.getElementById('page-companies').innerHTML = html;
        }
        window.addCompany = async()=>{ let name=prompt('Company name:'); if(name) await db.collection('companies').add({name, branches:[], createdAt:new Date()}); loadCompanies(); };
        window.editCompany = async(id,name)=>{ let newName=prompt('New name:',name); if(newName) await db.collection('companies').doc(id).update({name:newName}); loadCompanies(); };
        window.deleteCompany = async(id)=>{ if(confirm('Delete?')) await db.collection('companies').doc(id).delete(); loadCompanies(); };

        // ============ USERS ============
        async function loadUsers() {
            let snap=await db.collection('users').get();
            let html=`<div class="card"><div class="card-header">👥 Users <button class="btn btn-primary btn-sm" onclick="addUser()">+ Add</button></div><div class="table-container"><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Rating</th><th>Actions</th></tr></thead><tbody>`;
            snap.forEach(d=>{ let u=d.data(); if(u.email !== ADMIN_EMAIL) { html+=`<tr><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td><td>${'★'.repeat(u.rating||0)}</td><td><button class="btn btn-warning btn-sm" onclick="editUser('${u.uid}','${u.name}')">Edit</button> <button class="btn btn-info btn-sm" onclick="rateUser('${u.uid}')">Rate</button> <button class="btn btn-danger btn-sm" onclick="resetUserPwd('${u.email}')">Reset</button></td></tr>`; } });
            html+=`</tbody></table></div></div>`;
            document.getElementById('page-users').innerHTML = html;
        }
        window.addUser = async()=>{
            let name=prompt('Name:'), email=prompt('Email:'), pass=prompt('Password:'), role=prompt('Role (company_manager/office_staff/driver):');
            if(name&&email&&pass){
                let cred=await auth.createUserWithEmailAndPassword(email,pass);
                await db.collection('users').add({uid:cred.user.uid, name, email, role, rating:0, createdAt:new Date()});
                showAlert('User created','success'); loadUsers();
            }
        };
        window.editUser = async(uid,name)=>{ let newName=prompt('New name:',name); if(newName){ let snap=await db.collection('users').where('uid','==',uid).get(); snap.forEach(d=>db.collection('users').doc(d.id).update({name:newName})); loadUsers(); }};
        window.rateUser = async(uid)=>{ let rating=prompt('Rating (1-5):'); if(rating){ let snap=await db.collection('users').where('uid','==',uid).get(); snap.forEach(d=>db.collection('users').doc(d.id).update({rating:parseInt(rating)})); loadUsers(); }};
        window.resetUserPwd = (email)=>{ auth.sendPasswordResetEmail(email); showAlert('Reset email sent','success'); };

        // ============ LEAVES ============
        async function loadLeavesAdmin() {
            let snap=await db.collection('leaves').get();
            let html=`<div class="card"><div class="card-header">📅 Leave Requests</div><div class="table-container"><table><thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Reason</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
            snap.forEach(d=>{ let l=d.data(); html+=`<tr><td>${l.userName}</td><td>${l.type}</td><td>${l.fromDate} to ${l.toDate}</td><td>${l.reason}</td><td><span class="badge badge-${l.status==='approved'?'success':l.status==='pending'?'warning':'danger'}">${l.status}</span></td><td>${l.status==='pending'?`<button class="btn btn-success btn-sm" onclick="approveLeave('${d.id}')">Approve</button> <button class="btn btn-danger btn-sm" onclick="rejectLeave('${d.id}')">Reject</button>`:'-'}</td></tr>`; });
            html+=`</tbody></table></div></div>`;
            document.getElementById('page-leaves').innerHTML = html;
        }
        window.approveLeave = async(id)=>{ await db.collection('leaves').doc(id).update({status:'approved'}); loadLeavesAdmin(); showAlert('Leave approved','success'); };
        window.rejectLeave = async(id)=>{ await db.collection('leaves').doc(id).update({status:'rejected'}); loadLeavesAdmin(); };

        async function loadMyLeaves() {
            let snap=await db.collection('leaves').where('userId','==',currentUser.uid).get();
            let html=`<div class="card"><div class="card-header">📝 My Leaves <button class="btn btn-primary btn-sm" onclick="applyLeave()">+ Apply</button></div><div class="table-container"><table><thead><tr><th>Type</th><th>From</th><th>To</th><th>Reason</th><th>Status</th></tr></thead><tbody>`;
            snap.forEach(d=>{ let l=d.data(); html+=`<tr><td>${l.type}</td><td>${l.fromDate}</td><td>${l.toDate}</td><td>${l.reason}</td><td><span class="badge badge-${l.status==='approved'?'success':l.status==='pending'?'warning':'danger'}">${l.status}</span></td></tr>`; });
            html+=`</tbody></table></div></div>`;
            document.getElementById('page-my-leaves').innerHTML = html;
        }
        window.applyLeave = async()=>{
            let type=prompt('Leave type (Sick/Casual/Paid):'), from=prompt('From date (YYYY-MM-DD):'), to=prompt('To date (YYYY-MM-DD):'), reason=prompt('Reason:');

        window.deleteHoliday = async(id)=>{ await db.collection('holidays').doc(id).delete(); loadHolidays(); };

        // ============ PAYROLL ============
        async function loadPayroll() {
            let users=await db.collection('users').get();
            let html=`<div class="card"><div class="card-header">💰 Payroll - ${new Date().toLocaleString('default',{month:'long'})}</div><div class="table-container"><table><thead><tr><th>Employee</th><th>Base Salary</th><th>Days Present</th><th>Calculated</th><th>Status</th></tr></thead><tbody>`;
            for(let u of users.docs){
                let data=u.data();
                if(data.email !== ADMIN_EMAIL) {
                    let att=await db.collection('attendance').where('userId','==',data.uid).where('date','>=',new Date().toISOString().slice(0,7)).get();
                    let days=att.size;
                    let salary=data.salary||20000;
                    let calculated=(salary/26)*days;
                    html+=`<tr><td>${data.name}</td><td>₹${salary}</td><td>${days}</td><td>₹${calculated.toFixed(0)}</td><td><span class="badge badge-success">Ready</span></td></tr>`;
                }
            }
            html+=`</tbody></table><button class="btn btn-success" style="margin-top:15px;" onclick="showAlert('Payroll exported to Excel','info')">Export Payroll</button></div></div>`;
            document.getElementById('page-payroll').innerHTML = html;
        }

        // ============ SETTINGS ============
        async function loadSettings() {
            document.getElementById('page-settings').innerHTML = `
                <div class="card"><div class="card-header"><i class="fas fa-image"></i> Logo Settings</div>
                <div style="text-align:center;padding:15px;"><img id="logoPreview" src="${currentLogoUrl}" style="max-width:120px;border-radius:10px;"></div>
                <input type="file" id="logoFile" accept="image/*" onchange="uploadLogo(this)">
                <button class="btn btn-danger" style="margin-top:10px;" onclick="resetLogo()">Reset Logo</button>
                </div>
                <div class="card"><div class="card-header"><i class="fas fa-lock"></i> Security</div>
                <button class="btn btn-warning" onclick="changeAdminPassword()">Change Admin Password</button>
                <button class="btn btn-info" onclick="exportAllData()">Export All Data (Backup)</button>
                </div>
            `;
        }
        window.uploadLogo = async(input)=>{
            let file=input.files[0];
            if(file){
                let ref=storage.ref().child(`logo/logo_${Date.now()}`);
                await ref.put(file);
                let url=await ref.getDownloadURL();
                await db.collection('settings').doc('companyLogo').set({logoUrl:url});
                currentLogoUrl=url;
                document.querySelectorAll('.logo-img').forEach(img=>img.src=url);
                document.getElementById('logoPreview').src=url;
                showAlert('Logo updated','success');
            }
        };
        window.resetLogo = async()=>{
            await db.collection('settings').doc('companyLogo').delete();
            currentLogoUrl="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23667eea'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white' font-weight='bold'%3ES%3C/text%3E%3C/svg%3E";
            document.querySelectorAll('.logo-img').forEach(img=>img.src=currentLogoUrl);
            if(document.getElementById('logoPreview')) document.getElementById('logoPreview').src=currentLogoUrl;
            showAlert('Logo reset','success');
        };
        window.changeAdminPassword = async()=>{
            let old=prompt('Current password:');
            if(!old) return;
            let newPwd=prompt('New password (min 6 chars):');
            if(!newPwd||newPwd.length<6){ showAlert('Min 6 chars','error'); return; }
            let confirm=prompt('Confirm password:');
            if(newPwd!==confirm){ showAlert('Passwords do not match','error'); return; }
            try{
                let cred=firebase.auth.EmailAuthProvider.credential(currentUser.email,old);
                await currentUser.reauthenticateWithCredential(cred);
                await currentUser.updatePassword(newPwd);
                showAlert('Password changed! Login again.','success');
                setTimeout(()=>logout(),2000);
            } catch(e){ showAlert('Error: '+e.message,'error'); }
        };
        window.exportAllData = async()=>{
            showAlert('Data export initiated - check console','info');
            let collections=['users','companies','attendance','leaves','tasks','vehicles','customers','expenses','notices','holidays'];
            let allData={};
            for(let col of collections){
                let snap=await db.collection(col).get();
                let data=[]; snap.forEach(d=>data.push({id:d.id,...d.data()}));
                allData[col]=data;
            }
            console.log('EXPORTED DATA:',allData);
            alert('Data exported to console. Open Developer Tools (F12) to see the data.');
        };

        // ============ ATTENDANCE ============
        async function loadAttendancePage() {
            document.getElementById('page-attendance').innerHTML = `
                <div class="card"><div class="card-header"><i class="fas fa-camera"></i> Mark Attendance</div>
                <div id="attStatus" class="alert alert-info"></div>
                <div class="webcam-box"><video id="webcam" autoplay playsinline style="width:100%;max-width:280px;"></video><canvas id="canvas" style="display:none;"></canvas><div id="previewDiv" style="display:none;"><img id="previewImg" style="width:100%;max-width:280px;"><p>✅ Selfie captured!</p></div></div>
                <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px;">
                    <button class="btn btn-primary" onclick="startCam()"><i class="fas fa-video"></i> Start</button>
                    <button class="btn btn-success" onclick="captureSelfie()"><i class="fas fa-camera"></i> Selfie</button>
                    <button class="btn btn-warning" onclick="retakeSelfie()"><i class="fas fa-redo"></i> Retake</button>
                    <button class="btn btn-info" onclick="getLocation()"><i class="fas fa-map-marker-alt"></i> Location</button>
                </div>
                <div id="locationMsg" class="alert alert-warning" style="margin-top:10px;">📍 Click "Location" for GPS</div>
                <div id="actionBtns" style="margin-top:15px;text-align:center;"></div></div>
            `;
            startCam(); await checkTodayStatus();
        }
        async function checkTodayStatus() {
            let today=new Date().toISOString().split('T')[0];
            let snap=await db.collection('attendance').where('userId','==',currentUser.uid).where('date','==',today).get();
            let hasActive=false;
            snap.forEach(d=>{ let data=d.data(); if((data.checkIn&&!data.checkOut)||(data.tripStart&&!data.tripEnd)) hasActive=true; });
            let btns=document.getElementById('actionBtns');
            if(hasActive) btns.innerHTML=`<button class="btn btn-danger" onclick="endAction()">End / Check Out</button>`;
            else btns.innerHTML=`<button class="btn btn-success" onclick="startAction()">Start / Check In</button>`;
        }
        window.startCam = async()=>{ if(stream) stream.getTracks().forEach(t=>t.stop()); stream=await navigator.mediaDevices.getUserMedia({video:true}); document.getElementById('webcam').srcObject=stream; };
        window.captureSelfie = function(){
            let video=document.getElementById('webcam'), canvas=document.getElementById('canvas');
            canvas.width=video.videoWidth; canvas.height=video.videoHeight;
            canvas.getContext('2d').drawImage(video,0,0);
            currentPhoto=canvas.toDataURL('image/jpeg');
            document.getElementById('previewDiv').style.display='block';
            document.getElementById('previewImg').src=currentPhoto;
            if(stream){ stream.getTracks().forEach(t=>t.stop()); document.getElementById('webcam').style.display='none'; }
            showAlert('Selfie captured! Now get location.','success');
        };
        window.retakeSelfie = function(){ currentPhoto=null; document.getElementById('previewDiv').style.display='none'; document.getElementById('webcam').style.display='block'; startCam(); };
        window.getLocation = async function(){
            try{
                let pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true}));
                currentLocation={lat:pos.coords.latitude,lng:pos.coords.longitude};
                document.getElementById('locationMsg').innerHTML=`📍 ${currentLocation.lat.toFixed(6)}, ${currentLocation.lng.toFixed(6)} ✅`;
                document.getElementById('locationMsg').className='alert alert-success';
                showAlert('Location captured!','success');
            } catch(e){ document.getElementById('locationMsg').innerHTML=`⚠️ Error: ${e.message}`; }
        };
        window.startAction = async function(){
            if(!currentPhoto){ showAlert('Take selfie first!','error'); return; }
            if(!currentLocation){ showAlert('Get location first!','error'); return; }
            let today=new Date().toISOString().split('T')[0];
            await db.collection('attendance').add({userId:currentUser.uid, userName:currentUserData.name, companyId:currentUserCompany, date:today, checkIn:new Date().toISOString(), checkInLocation:currentLocation, checkInPhoto:currentPhoto, status:'active', type:'office'});
            showAlert('Checked in!','success');
            resetAfterAction(); await checkTodayStatus();
        };
        window.endAction = async function(){
            if(!currentPhoto){ showAlert('Take selfie first!','error'); return; }
            if(!currentLocation){ showAlert('Get location first!','error'); return; }
            let today=new Date().toISOString().split('T')[0];
            let snap=await db.collection('attendance').where('userId','==',currentUser.uid).where('date','==',today).where('status','==','active').get();
            if(snap.empty){ showAlert('No active session!','error'); return; }
            let id=null; snap.forEach(d=>id=d.id);
            await db.collection('attendance').doc(id).update({checkOut:new Date().toISOString(), checkOutLocation:currentLocation, checkOutPhoto:currentPhoto, status:'completed'});
            showAlert('Checked out!','success');
            resetAfterAction(); await checkTodayStatus();
        };
        function resetAfterAction(){ currentPhoto=null; document.getElementById('previewDiv').style.display='none'; document.getElementById('webcam').style.display='block'; startCam(); }

        // ============ REPORTS ============
        async function loadReports() {
            document.getElementById('page-reports').innerHTML = `
                <div class="card"><div class="card-header">📊 Generate Reports</div>
                <div class="grid-2">
                    <input type="date" id="startDate"><input type="date" id="endDate">
                    <input type="text" id="filterName" placeholder="Employee Name">
                    <button class="btn btn-primary" onclick="generateReport()">Generate</button>
                    <button class="btn btn-success" onclick="exportReportExcel()">Excel</button>
                    <button class="btn btn-danger" onclick="exportReportPDF()">PDF</button>
                </div>
                <div id="reportResults" style="margin-top:15px;"></div></div>
            `;
        }
        window.generateReport = async function(){
            let start=document.getElementById('startDate').value, end=document.getElementById('endDate').value, filter=document.getElementById('filterName').value.toLowerCase();
            if(!start||!end){ showAlert('Select dates','error'); return; }
            let q=db.collection('attendance').where('date','>=',start).where('date','<=',end);
            let snap=await q.get();
            let data=[]; snap.forEach(d=>data.push(d.data()));
            if(filter) data=data.filter(d=>d.userName?.toLowerCase().includes(filter));
            window.reportData=data;
            let html=`<h3>${data.length} Records</h3><div class="table-container"><table><thead><tr><th>Name</th><th>Date</th><th>Check In</th><th>Check Out</th><th>Location</th><th>Photo</th></tr></thead><tbody>`;
            data.forEach(d=>{
                let loc='-';
                if(d.checkInLocation) loc=`${d.checkInLocation.lat?.toFixed(4)},${d.checkInLocation.lng?.toFixed(4)}`;
                else if(d.startLocation) loc=`${d.startLocation.lat?.toFixed(4)},${d.startLocation.lng?.toFixed(4)}`;
                html+=`<tr><td>${d.userName}</td><td>${d.date}</td><td>${d.checkIn?new Date(d.checkIn).toLocaleTimeString():'-'}</td><td>${d.checkOut?new Date(d.checkOut).toLocaleTimeString():'-'}</td><td>${loc}</td><td><img src="${d.checkInPhoto||d.startPhoto}" width="30" style="border-radius:50%;cursor:pointer" onclick="window.open(this.src)"></td></tr>`;
            });
            html+=`</tbody></table></div>`;
            document.getElementById('reportResults').innerHTML=html;
        };
        window.exportReportExcel = function(){
            if(!window.reportData?.length){ showAlert('Generate report first','error'); return; }
            let data=window.reportData.map(r=>({Name:r.userName,Date:r.date,CheckIn:new Date(r.checkIn).toLocaleString(),CheckOut:new Date(r.checkOut).toLocaleString(),Latitude:r.checkInLocation?.lat||r.startLocation?.lat||'-',Longitude:r.checkInLocation?.lng||r.startLocation?.lng||'-'}));
            let ws=XLSX.utils.json_to_sheet(data); let wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Report'); XLSX.writeFile(wb,'SPEEDEL_Report.xlsx'); showAlert('Excel downloaded','success');
        };
        window.exportReportPDF = function(){
            if(!window.reportData?.length){ showAlert('Generate report first','error'); return; }
            let {jsPDF}=window.jspdf; let doc=new jsPDF('landscape');
            doc.text('SPEEDEL EXPRESS - Attendance Report',14,10);
            let tableData=window.reportData.map(r=>[r.userName,r.date,new Date(r.checkIn).toLocaleTimeString(),new Date(r.checkOut).toLocaleTimeString(),`${r.checkInLocation?.lat?.toFixed(4)||'-'}`]);
            doc.autoTable({head:[['Name','Date','Check In','Check Out','Location']],body:tableData,startY:20});
            doc.save('SPEEDEL_Report.pdf'); showAlert('PDF downloaded','success');
        };

        window.logout = async()=>{ await auth.signOut(); if(stream) stream.getTracks().forEach(t=>t.stop()); renderLogin(); };

        // Auth State Listener
        auth.onAuthStateChanged(async(user)=>{
            currentUser = user;
            if(!user){ renderLogin(); return; }
            
            // Check if this is the admin user by email
            if(user.email && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()){
                // Ensure admin exists in Firestore
                await ensureAdminInFirestore(user);
                currentUserRole = 'admin';
                currentUserData = { name: 'Super Admin', role: 'admin', email: user.email };
                renderMainLayout();
                return;
            }
            
            // For other users, check Firestore
            let snap = await db.collection('users').where('uid','==',user.uid).get();
            if(!snap.empty){ 
                snap.forEach(d=>{ currentUserData = d.data(); currentUserRole = currentUserData.role; currentUserCompany = currentUserData.companyId; }); 
                renderMainLayout(); 
            } else { 
                showAlert('User role not found. Contact admin.', 'error');
                renderLogin(); 
            }
        });
    </script>
